name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ── 1. 바이너리 빌드 ──────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 의존성 설치
        run: npm install

      - name: 바이너리 빌드
        run: npm run build:binary

      - name: SHA256 계산
        run: |
          sha256sum bin/mlc-macos-arm64 | awk '{print $1}' > bin/mlc-macos-arm64.sha256
          sha256sum bin/mlc-linux-x64   | awk '{print $1}' > bin/mlc-linux-x64.sha256
          sha256sum bin/mlc-win-x64.exe | awk '{print $1}' > bin/mlc-win-x64.exe.sha256

      - name: 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: bin/

  # ── 2. macOS .pkg 인스톨러 ────────────────────────────
  macos-pkg:
    runs-on: macos-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: 바이너리 다운로드
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: bin/

      - name: 실행 권한 부여
        run: chmod +x bin/mlc-macos-arm64

      - name: .pkg 빌드
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p pkg-root/usr/local/bin
          cp bin/mlc-macos-arm64 pkg-root/usr/local/bin/mlc
          pkgbuild \
            --root pkg-root \
            --identifier com.amirokim.mlc \
            --version "$VERSION" \
            --install-location / \
            bin/mlc-macos-arm64.pkg

      - name: .pkg 업로드
        uses: actions/upload-artifact@v4
        with:
          name: macos-pkg
          path: bin/mlc-macos-arm64.pkg

  # ── 3. Windows NSIS 인스톨러 ─────────────────────────
  windows-installer:
    runs-on: windows-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: 바이너리 다운로드
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: bin/

      - name: NSIS 빌드
        run: |
          copy bin\mlc-win-x64.exe scripts\mlc-win-x64.exe
          cd scripts
          makensis installer.nsi

      - name: 인스톨러 업로드
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: scripts/mlc-setup-win-x64.exe

  # ── 4. GitHub Release 생성 ────────────────────────────
  release:
    runs-on: ubuntu-latest
    needs: [build, macos-pkg, windows-installer]
    permissions:
      contents: write
    steps:
      - name: 바이너리 다운로드
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: bin/

      - name: macOS .pkg 다운로드
        uses: actions/download-artifact@v4
        with:
          name: macos-pkg
          path: bin/

      - name: Windows 인스톨러 다운로드
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: bin/

      - name: SHA256 읽기
        id: sha
        run: |
          echo "macos=$(cat bin/mlc-macos-arm64.sha256)"   >> $GITHUB_OUTPUT
          echo "linux=$(cat bin/mlc-linux-x64.sha256)"     >> $GITHUB_OUTPUT
          echo "win=$(cat bin/mlc-win-x64.exe.sha256)"     >> $GITHUB_OUTPUT

      - name: Homebrew 포뮬러 업데이트
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          MACOS_SHA=$(cat bin/mlc-macos-arm64.sha256)
          LINUX_SHA=$(cat bin/mlc-linux-x64.sha256)

          git clone https://x-access-token:${GH_TOKEN}@github.com/donginKim/homebrew-mlc.git
          cd homebrew-mlc

          sed -i "s/version \".*\"/version \"$VERSION\"/" Formula/mlc.rb
          # macOS sha256 교체 (첫 번째 PLACEHOLDER 또는 기존 값)
          awk -v sha="$MACOS_SHA" '
            /on_macos/,/end/ { if (/sha256/) { sub(/"[^"]*"/, "\"" sha "\"") } }
            { print }
          ' Formula/mlc.rb > /tmp/mlc.rb && mv /tmp/mlc.rb Formula/mlc.rb
          # Linux sha256 교체
          awk -v sha="$LINUX_SHA" '
            /on_linux/,/end/ { if (/sha256/) { sub(/"[^"]*"/, "\"" sha "\"") } }
            { print }
          ' Formula/mlc.rb > /tmp/mlc.rb && mv /tmp/mlc.rb Formula/mlc.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/mlc.rb
          git commit -m "chore: mlc v$VERSION 포뮬러 업데이트"
          git push

      - name: GitHub Release 생성
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## 설치 방법

            ### macOS — 인스톨러 (.pkg)
            `mlc-macos-arm64.pkg` 를 다운받아 실행하세요.

            ### macOS / Linux — curl 스크립트
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | sh
            ```

            ### Windows — PowerShell 스크립트
            ```powershell
            irm https://raw.githubusercontent.com/${{ github.repository }}/main/install.ps1 | iex
            ```
            또는 `mlc-setup-win-x64.exe` 를 다운받아 실행하세요.

            ### Homebrew
            ```bash
            brew tap donginKim/mlc
            brew install mlc
            ```

            ---

            ### SHA256 체크섬
            ```
            ${{ steps.sha.outputs.macos }}  mlc-macos-arm64
            ${{ steps.sha.outputs.linux }}  mlc-linux-x64
            ${{ steps.sha.outputs.win }}    mlc-win-x64.exe
            ```
          files: |
            bin/mlc-macos-arm64
            bin/mlc-linux-x64
            bin/mlc-win-x64.exe
            bin/mlc-macos-arm64.pkg
            bin/mlc-setup-win-x64.exe
